name: Desktop Build (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          cd frontend/web
          npm install
          cd ../desktop
          npm install

      - name: Build Web Assets & Package App
        run: |
          npm run build --prefix frontend/desktop
          cd frontend/desktop
          npx electron-builder build --win
        env:
          GITHUB_ACTIONS: true

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arlong-windows-exe
          path: frontend/desktop/dist_electron/*.exe
