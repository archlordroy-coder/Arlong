name: Desktop Build (Multi-platform)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"

      - name: Install Root Dependencies
        run: npm install

      - name: Install Desktop Dependencies
        run: |
          cd frontend/desktop
          npm install

      - name: Build & Package Desktop App
        run: |
          cd frontend/desktop
          npm run build
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder build --windows --x64
          else
            npx electron-builder build --linux --AppImage
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mboadrive-desktop-${{ matrix.os }}
          path: |
            frontend/desktop/dist_electron/*.exe
            frontend/desktop/dist_electron/*.AppImage
