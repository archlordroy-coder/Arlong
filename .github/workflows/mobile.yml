name: Mobile Build (Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install
          cd frontend/mobile && npm install

      - name: Build Web Assets & Generate APK
        run: |
          chmod +x build-apk.sh
          ./build-apk.sh
        env:
          GITHUB_ACTIONS: true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arlong-android-apk
          path: frontend/mobile/android/app/build/outputs/apk/debug/ARLONG.apk
